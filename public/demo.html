<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WebSocket Widget SaaS Demo</title>
  <style>
    body{ margin:0; min-height:100vh; background:#000; color:#e8ecf4; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace; }
    .wrap{ max-width: 960px; margin: 0 auto; padding: 36px 18px; }
    .hero{ border:1px solid rgba(110,168,254,.22); border-radius: 16px; padding: 20px; background: rgba(10,10,15,.85); }
    a{ color:#7ee1ff; }
    code{ background: rgba(255,255,255,.06); padding: 2px 6px; border-radius: 8px; }
    .grid{ display:grid; grid-template-columns: 1fr; gap:14px; margin-top:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1 style="margin:0 0 8px 0;">WebSocket Chat Widget (SaaS MVP)</h1>
      <div style="opacity:.75">Embeddable chat widget with rooms + persistence + solo bot.</div>
      <div class="grid">
        <div>Widget test page: <a href="/widget-test">/widget-test</a></div>
        <div>Embed snippet:</div>
        <div><code>&lt;script src="https://YOUR-URL/widget.js" data-site="acme-gym"&gt;&lt;/script&gt;</code></div>
      </div>
    </div>
  </div>

  <script src="/widget.js" data-site="demo-site"></script>
</body>
</html>
